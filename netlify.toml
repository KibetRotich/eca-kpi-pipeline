[build]
  publish = "."
  command = ""   # no build step needed — pure HTML

[[redirects]]
  from = "/ECA_Dashboard.html"
  to   = "/"
  status = 301

[[redirects]]
  from = "/eca_dashboard"
  to   = "/"
  status = 301

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"
